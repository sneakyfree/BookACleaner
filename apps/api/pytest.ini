[pytest]
# The suite is built on async fixtures/tests (httpx AsyncClient). Without auto
# mode the autouse DB-setup fixture never runs, so every DB-backed test fails
# with "no such table". Auto mode lets a bare `pytest` work as designed.
asyncio_mode = auto
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::pydantic.warnings.PydanticDeprecatedSince20
