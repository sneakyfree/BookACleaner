version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: bookacleaner-db
    environment:
      POSTGRES_USER: bookacleaner
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bookacleaner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookacleaner"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bookacleaner-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

