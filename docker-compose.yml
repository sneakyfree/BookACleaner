version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bookacleaner-db
    environment:
      POSTGRES_USER: bookacleaner
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bookacleaner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookacleaner"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bookacleaner-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Uncomment to run API in Docker
  # api:
  #   build:
  #     context: ./apps/api
  #     dockerfile: Dockerfile
  #   container_name: bookacleaner-api
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - DATABASE_URL=postgresql://bookacleaner:password@db:5432/bookacleaner
  #     - REDIS_URL=redis://redis:6379
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - ./apps/api:/app

volumes:
  postgres_data:
  redis_data:
