name: CI

# Rewritten 2026-07-05 (witch-hunt Sprint 2). The previous workflow was aspirational:
# it ran `pnpm install --frozen-lockfile` in a repo that has no pnpm-lock.yaml and
# `pnpm db:generate` for a Prisma setup that does not exist (stack is SQLAlchemy),
# so EVERY run failed within seconds and CI protected nothing — which is how a
# main that couldn't even boot (`next dev` → missing next-intl) stayed "green".
# This version tests what the repo actually is: FastAPI + pytest, Next.js + npm.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api-tests:
    name: API tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Run test suite (SQLite fallback, same as local)
        working-directory: apps/api
        run: TESTING=true python -m pytest -q

  web-build:
    name: Web production build (next build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Clean install (catches missing deps like the next-intl incident)
        working-directory: apps/web
        run: npm ci

      - name: Production build
        working-directory: apps/web
        run: npx next build
        env:
          NEXTAUTH_SECRET: ci-build-only-secret
          NEXTAUTH_URL: http://localhost:3002
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Assert build artifact exists
        working-directory: apps/web
        run: test -f .next/BUILD_ID && echo "BUILD_ID=$(cat .next/BUILD_ID)"
