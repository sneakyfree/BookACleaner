name: CI

# Real-stack CI. The previous version was written for a pnpm + Prisma +
# postgres/redis stack that no longer exists, so lint/test/build failed in ~1s
# on every PR and the 136 backend pytest tests never actually ran.
#
# Stack today: npm (not pnpm), FastAPI + SQLAlchemy (not Prisma), sqlite for
# tests (the F1 fix drops pool kwargs for sqlite and conftest forces
# TESTING=true, so no DB service is needed), Next.js 14 web app.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Backend tests (pytest)
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - name: runner-lint (hosted runners are billing-locked)
        run: bash "$GITHUB_WORKSPACE/.github/lint/lint-runner-labels.sh" "$GITHUB_WORKSPACE/.github/workflows"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt

      - name: Install backend dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Run pytest (sqlite, TESTING mode)
        # conftest.py sets TESTING=true; no postgres/redis needed.
        # DATABASE_URL is pinned to sqlite explicitly: app/database.py's
        # auto-fallback probes localhost:5432 and on the self-hosted Kit 0
        # runner a resident postgres container answers on that host port, so
        # without the pin the suite connects to the wrong database and dies
        # with "password authentication failed for user bookacleaner".
        run: cd apps/api && TESTING=true pytest -q
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci_test.db

  build:
    name: Web build (Next.js production)
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: cd apps/web && npm ci

      - name: Build
        # rm -rf .next avoids the stale /_document build hang.
        run: cd apps/web && rm -rf .next && npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  lint:
    name: Lint (advisory)
    runs-on: [self-hosted, linux, x64]
    # Promoted back to blocking: apps/web now ships its own root:true
    # .eslintrc.js whose plugins all resolve from apps/web/node_modules, so
    # the old "Cannot find module '@typescript-eslint/eslint-plugin'"
    # config-load failure (root .eslintrc.js plugins only resolve from a
    # repo-root install) is gone.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: cd apps/web && npm ci

      - name: Lint web
        run: cd apps/web && npm run lint

  deploy-staging:
    name: Deploy to Staging
    runs-on: [self-hosted, linux, x64]
    needs: [test, build]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: echo "Deploy to staging environment"
        # Add actual deployment steps here

  deploy-production:
    name: Deploy to Production
    runs-on: [self-hosted, linux, x64]
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: echo "Deploy to production environment"
        # Add actual deployment steps here
