name: E2E Link-Crawl

# Nav-404 / dead-link / white-page guard.
#
# Boots the API (sqlite, auto-seeded demo data) and a PRODUCTION standalone
# build of the web app, then BFS-crawls every reachable navigation target for
# every role. Any 404 / 5xx / branded-404 / error-boundary / blank page fails
# the build, so frontend<->backend path drift can never ship silently.
#
# The dev server emits false 500s on cold-compiled chunks, so we deliberately
# serve the standalone production output (next.config.js already sets
# output: 'standalone').

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  link-crawl:
    name: Link-crawl (nav 404 / dead-link guard)
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30

    env:
      NEXTAUTH_SECRET: ci-nextauth-secret-not-for-production
      INTERNAL_API_KEY: ci-internal-api-key
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pick free ports (avoid resident-container collisions)
        # The self-hosted Kit 0 box runs resident containers, so fixed host
        # ports (previously 8020/3030) can collide with — or silently point
        # the crawl at — a foreign service. Bind port 0 twice to get two
        # genuinely free ephemeral ports.
        run: |
          python3 - <<'EOF' >> "$GITHUB_ENV"
          import socket
          a, b = socket.socket(), socket.socket()
          a.bind(("127.0.0.1", 0)); b.bind(("127.0.0.1", 0))
          api, web = a.getsockname()[1], b.getsockname()[1]
          print(f"API_PORT={api}")
          print(f"WEB_PORT={web}")
          print(f"NEXT_PUBLIC_API_URL=http://localhost:{api}")
          print(f"NEXTAUTH_URL=http://localhost:{web}")
          EOF

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            apps/web/package-lock.json
            e2e/package-lock.json

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt

      - name: Install backend dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Install web dependencies
        run: cd apps/web && npm ci

      - name: Install E2E dependencies
        run: cd e2e && npm ci

      - name: Install Chromium OS dependencies
        # `playwright install --with-deps` shells out via `sudo sh -c ...`,
        # which the runner's sudoers (passwordless for apt-get ONLY) rejects.
        # Install the Ubuntu 24.04 chromium dependency set with plain apt-get.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2t64 libatk-bridge2.0-0t64 libatk1.0-0t64 libatspi2.0-0t64 \
            libcairo2 libcups2t64 libdbus-1-3 libdrm2 libgbm1 libglib2.0-0t64 \
            libnspr4 libnss3 libpango-1.0-0 libx11-6 libxcb1 libxcomposite1 \
            libxdamage1 libxext6 libxfixes3 libxkbcommon0 libxrandr2 \
            fonts-liberation fonts-noto-color-emoji

      - name: Install Playwright browser (chromium)
        run: cd e2e && npx playwright install chromium

      # ---- Backend: sqlite, TESTING mode. connect_db() creates the schema and
      # auto-seeds the demo users (client@demo.com / maria@demo.com /
      # admin@bookacleaner.ai, all password demo1234) when the DB is empty.
      # The F1 sqlite fix (database.py) drops pool kwargs for any sqlite URL, so
      # a plain sqlite+aiosqlite URL boots cleanly. REDIS_URL is left empty so
      # the cache runs in graceful no-op mode (no Redis service required).
      - name: Boot backend
        run: |
          cd apps/api
          rm -f ci.db
          TESTING=true \
          DEV_MODE=true \
          DATABASE_URL="sqlite+aiosqlite:///./ci.db" \
          REDIS_URL="" \
          FRONTEND_URL="http://localhost:${WEB_PORT}" \
          JWT_SECRET=ci-jwt-secret \
          NEXTAUTH_SECRET="${NEXTAUTH_SECRET}" \
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port "${API_PORT}" \
            > /tmp/api.log 2>&1 &
          echo "backend starting on ${API_PORT}"

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -sf "http://localhost:${API_PORT}/health" >/dev/null; then
              echo "backend healthy"; exit 0
            fi
            sleep 2
          done
          echo "::error::backend failed to become healthy"; cat /tmp/api.log; exit 1

      # ---- Frontend: PRODUCTION standalone build. rm -rf .next avoids the
      # stale /_document hang. NEXT_PUBLIC_* must be present at build time so the
      # client bundle and next.config rewrites target the API.
      - name: Build web (production)
        run: |
          cd apps/web
          rm -rf .next
          npm run build

      - name: Assemble and boot standalone frontend
        run: |
          cd apps/web
          # standalone/server.js serves ./.next/static and ./public relative to its cwd
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public || true
          cd .next/standalone
          PORT="${WEB_PORT}" HOSTNAME=127.0.0.1 \
          NEXT_PUBLIC_API_URL="http://localhost:${API_PORT}" \
          NEXTAUTH_URL="http://localhost:${WEB_PORT}" \
          NEXTAUTH_SECRET="${NEXTAUTH_SECRET}" \
          INTERNAL_API_KEY="${INTERNAL_API_KEY}" \
          nohup node server.js > /tmp/web.log 2>&1 &
          echo "frontend starting on ${WEB_PORT}"

      - name: Wait for frontend health
        run: |
          for i in $(seq 1 60); do
            if curl -sf "http://localhost:${WEB_PORT}/login" >/dev/null; then
              echo "frontend healthy"; exit 0
            fi
            sleep 2
          done
          echo "::error::frontend failed to become healthy"; cat /tmp/web.log; exit 1

      # ---- The guard. Fails the job (non-zero) on any broken navigation target.
      - name: Run link-crawl guard
        run: cd e2e && npm run test:crawl
        env:
          CI: 'true'
          BASE_URL: http://localhost:${{ env.WEB_PORT }}

      # NOTE: the link-crawl-report upload-artifact step was removed for now:
      # GitHub artifact storage is billing-blocked account-wide, so any
      # actions/upload-artifact call fails with "Artifact storage quota has
      # been hit" — and this one ran `if: always()`, so it reddened even green
      # runs. Failure details remain in the job log + the log dump below.
      # Restore the upload once billing is unblocked.

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "===== API LOG ====="; cat /tmp/api.log || true
          echo "===== WEB LOG ====="; cat /tmp/web.log || true
